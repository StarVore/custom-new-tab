<div class="view-controls">
  <button (click)="toggleHide()" class="view-toggle-btn">
    {{hideShowLbl}}
  </button>
  <button
    (click)="toggleStats()"
    class="view-toggle-btn"
    [class.active]="showStats"
  >
    {{statsLbl}}
  </button>
</div>
<main>
  <a routerLink="/settings" class="settings-link" title="Backend settings">⚙</a>
  <div style="margin-top: 50px">
    @if (showBookmarks) {
    <app-bookmarks-grid
      animate.enter="enter-animation"
      animate.leave="leaving"
    ></app-bookmarks-grid>
    } @else if (showStats) {
    <app-bookmark-stats
      animate.enter="enter-animation"
      animate.leave="leaving"
    ></app-bookmark-stats>
    }
  </div>
  <app-footer></app-footer>
</main>
