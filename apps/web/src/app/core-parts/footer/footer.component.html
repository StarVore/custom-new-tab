@if (mobileSheetOpen()) {
  <button
    class="mobile-footer-backdrop"
    type="button"
    aria-label="Close background details"
    (click)="closeMobileSheet()"
  ></button>
}

<footer class="footer-shell" [class.mobile-open]="mobileSheetOpen()">
  <button
    class="footer-tab"
    type="button"
    [attr.aria-expanded]="mobileSheetOpen()"
    (click)="toggleMobileSheet()"
  >
    <span>About Background</span>
    <span class="footer-tab-icon">{{
      mobileSheetOpen() ? "Hide" : "Show"
    }}</span>
  </button>

  <div class="footer-panel">
    <p class="footer-description">
      {{ photoDetails()?.explanation || "Loading photo details..." }}
    </p>
    @if (photoDetails()?.pageUrl) {
      <a
        [href]="photoDetails()?.pageUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="footer-link"
      >
        View NASA APOD page
      </a>
    }
  </div>
</footer>
