# Custom New Tab — Docker Compose
#
# Usage:
#   docker compose up -d --build
#
# Compose builds the web and APOD proxy directly from the GitHub repository.
# Copy .env.example to .env and adjust values before starting.

services:

  # Single production-oriented stack.
  # Prefer single-origin setup URLs through nginx reverse proxy:
  # - Bookmark service: http(s)://<host>/pb
  # - APOD service: http(s)://<host>/apod

  web:
    build:
      context: https://github.com/${GIT_OWNER_REPO:-StarVore/custom-new-tab}.git#${GIT_REF:-main}
      dockerfile: apps/web/Dockerfile
    environment:
      ENABLE_TLS: "${ENABLE_TLS:-false}"
    ports:
      - "${WEB_PORT:-80}:80"
      - "${WEB_TLS_PORT:-443}:443"
    volumes:
      - "${TLS_CERTS_DIR:-./certs}:/etc/nginx/certs:ro"
    restart: unless-stopped

  pocketbase:
    build:
      context: https://github.com/${GIT_OWNER_REPO:-StarVore/custom-new-tab}.git#${GIT_REF:-main}
      dockerfile: services/pocketbase/Dockerfile
      args:
        POCKETBASE_VERSION: "${POCKETBASE_VERSION:-0.36.7}"
    ports:
      - "${POCKETBASE_PORT:-8090}:8090"
    volumes:
      - pocketbase_data:/pb/pb_data
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-UTC}"
    restart: unless-stopped

  apod-proxy:
    build:
      context: https://github.com/${GIT_OWNER_REPO:-StarVore/custom-new-tab}.git#${GIT_REF:-main}
      dockerfile: services/apod-proxy/Dockerfile
    environment:
      PORT: "3001"
      APOD_ENABLE_TLS: "${APOD_ENABLE_TLS:-false}"
      APOD_TLS_CERT_PATH: "/etc/nginx/certs/cert.pem"
      APOD_TLS_KEY_PATH: "/etc/nginx/certs/key.pem"
      TZ: "${TZ:-UTC}"
    ports:
      - "${APOD_PROXY_PORT:-3001}:3001"
    volumes:
      - "${TLS_CERTS_DIR:-./certs}:/etc/nginx/certs:ro"
    restart: unless-stopped

volumes:
  pocketbase_data:
