@if (mobileSheetOpen()) {
  <button
    class="mobile-footer-backdrop"
    type="button"
    aria-label="Close background details"
    (click)="closeMobileSheet()"
  ></button>
}

<footer
  class="footer-shell fixed inset-x-0 bottom-0 z-50 border-t border-white/20 bg-black/60 text-white backdrop-blur-md"
  [class.mobile-open]="mobileSheetOpen()"
>
  <button
    class="footer-tab"
    type="button"
    [attr.aria-expanded]="mobileSheetOpen()"
    (click)="toggleMobileSheet()"
  >
    <span>About Background</span>
    <span class="footer-tab-icon">{{ mobileSheetOpen() ? 'Hide' : 'Show' }}</span>
  </button>

  <div class="footer-panel mx-auto max-w-5xl px-3 py-2 md:px-4 md:py-3">
    <p
      class="text-xs leading-snug drop-shadow-[0_1px_2px_rgba(0,0,0,0.85)] md:text-base md:leading-relaxed"
    >
      {{ photoDetails?.explanation || "Loading photo details..." }}
    </p>
    @if (photoDetails?.pageUrl) {
      <a
        [href]="photoDetails?.pageUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="mt-1 inline-block text-[11px] font-medium text-cyan-200 underline decoration-cyan-300/70 underline-offset-2 hover:text-cyan-100 md:mt-2 md:text-sm"
      >
        View NASA APOD page
      </a>
    }
  </div>
</footer>
