<footer
  class="fixed inset-x-0 bottom-0 z-50 border-t border-white/20 bg-black/60 text-white backdrop-blur-md"
>
  <div class="mx-auto max-w-5xl px-4 py-3">
    <p
      class="line-clamp-3 text-sm leading-relaxed drop-shadow-[0_1px_2px_rgba(0,0,0,0.85)] md:text-base"
    >
      {{ photoDetails?.explanation || "Loading photo details..." }}
    </p>
    @if (photoDetails?.pageUrl) {
      <a
        [href]="photoDetails?.pageUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="mt-2 inline-block text-xs font-medium text-cyan-200 underline decoration-cyan-300/70 underline-offset-2 hover:text-cyan-100 md:text-sm"
      >
        View NASA APOD page
      </a>
    }
  </div>
</footer>
